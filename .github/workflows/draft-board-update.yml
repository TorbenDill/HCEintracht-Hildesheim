name: Draft Board Wochen-Update

on:
  schedule:
    # Jeden Donnerstag um 08:47 UTC (~10:47 MESZ)
    - cron: "47 8 * * 4"
  workflow_dispatch: {}

permissions:
  issues: write

jobs:
  create-update-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Update-Issue erstellen
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Draft Board Update ${today} – NFL Draft 2027`,
              labels: ["draft-update"],
              body: [
                "@claude Bitte führe das wöchentliche Update des NFL-Draft-2027-Boards durch (Donnerstags-Update):",
                "",
                "## Qualitätsstufe (verbindlich – gilt für JEDE Aufnahme und Änderung)",
                "- **Nur mit Quellen einfügen:** Kein Spieler und keine geänderte Angabe (Schule, Rank, Projektion) kommt ins Board ohne **mindestens 2 unabhängige, seriöse Quellen** im Feld `sources`. Der Build (`scripts/build_2027.py`) hat ein Quellen-Gate und wirft jeden Eintrag mit weniger als 2 Quellen automatisch raus – unbelegte Einträge sind also verlorene Arbeit.",
                "- **Eligibility zwingend prüfen:** Vor JEDER Aufnahme gegen die **NFL-Draft-2026-Ergebnisse** und den aktuellen College-Roster gegenchecken. Wer 2026 gedraftet wurde, in der NFL ist oder für 2026 keine College-Eligibility mehr hat, ist NICHT aufnehmbar und – falls bereits im Board – zu entfernen. Quelle angeben (z. B. NFL.com Draft-Tracker, Schul-Roster 2026).",
                "- **Schule/Team verifizieren:** Transfer-Portal-Wechsel beachten – die `school` muss das Team der **Saison 2026** sein, per aktueller Roster-/Transfer-Quelle belegt. Abhängige Reporttexte (z. B. genannter Quarterback eines Receivers) mitziehen.",
                "- **Qualitätsstufe im Datensatz:** Der Build vergibt pro Spieler automatisch `qualitaet` (`geprueft` = 3+ Quellen, `belegt` = 2 Quellen). Ziel ist `geprueft`; strebe für neue Profile 3+ Quellen an.",
                "",
                "1. **Recherche** über möglichst viele seriöse Quellen (viele blocken direkte Fetches – dann Web-Suche über deren Inhalte nutzen):",
                "   - nflmockdraftdatabase.com (Consensus Big Board 2027), tankathon.com, ESPN, The Athletic, walterfootball.com, prodraftscouting.com, nfldraftbuzz.com",
                "   - **Immer zusätzlich analysieren:** bigboardlab.com, thedraftnetwork.com, cbssports.com/nfl/draft/mock-draft, underdogmockdraft.com, pff.com/draft/big-board?season=2027, drafttek.com",
                "2. **`data/research2027.json` aktualisieren**: Ranks/Projektionen verschieben, Riser/Faller einarbeiten, Spieler entfernen, die nicht mehr draft-eligible sind (bereits gedraftet/NFL). Mock-Draft (32 Picks) an aktuelle Draft-Order-Projektionen und Team-Needs anpassen.",
                "3. **Board wachsen lassen**: In JEDER Woche 3–5 NEUE Spielerprofile ergänzen (weiter in die Tiefe der Positionsrankings, Day-2/Day-3-Prospects, Sleeper). Für jeden neuen Spieler alle Felder ausfüllen – individuelles `report_de` (5–8 Sätze, natürlich, nicht generisch), individuelles `forstner`-Zitat (variabler Tonfall) sowie vielseitige, spielerspezifische `best_case`/`worst_case`-NFL-Vergleiche (Vergleichsnamen NICHT wiederholen). Ziel: über die Saison auf 150+ Profile wachsen.",
                "4. **Lexikon erweitern**: In `data/lexikon.json` 1–2 neue Draft-/Scouting-Begriffe ergänzen (gleiche Struktur: slug, term, category, kurz, text mit 3 ausführlichen deutschen Absätzen, keine Gedankenstriche). Keine bestehenden Begriffe duplizieren.",
                "5. **`updated`-Datum** in `data/board-meta.json` auf heute setzen.",
                "6. **Neu bauen**: `python3 scripts/build_2027.py` (erzeugt `data/data.json` + `data/mockdraft.json`), dann `npm install && npx next build` zur Verifikation.",
                "7. **Deploy**: Änderungen committen und auf `main` pushen (Vercel deployt automatisch).",
                "",
                "Ziel: Das Board verschiebt sich sichtbar mit der Nachrichtenlage (Leistungen, Verletzungen, Transfers, Declares) UND wächst mit jeder Woche – neue Profile, neue Lexikon-Begriffe, aktualisierte Rankings."
              ].join("\n")
            });
