name: Draft Board 14-Tage-Update

on:
  schedule:
    # Am 1. und 15. jedes Monats um 08:47 UTC (~alle 14 Tage)
    - cron: "47 8 1,15 * *"
  workflow_dispatch: {}

permissions:
  issues: write

jobs:
  create-update-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Update-Issue erstellen
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Draft Board Update ${today} – NFL Draft 2027`,
              labels: ["draft-update"],
              body: [
                "@claude Bitte führe das planmäßige 14-Tage-Update des NFL-Draft-2027-Boards durch:",
                "",
                "1. **Recherche** über möglichst viele seriöse Quellen (viele blocken direkte Fetches – dann Web-Suche über deren Inhalte nutzen):",
                "   - nflmockdraftdatabase.com (Consensus Big Board 2027), tankathon.com, ESPN, The Athletic, walterfootball.com, prodraftscouting.com, nfldraftbuzz.com",
                "   - **Immer zusätzlich analysieren:** bigboardlab.com, thedraftnetwork.com, cbssports.com/nfl/draft/mock-draft, underdogmockdraft.com, pff.com/draft/big-board?season=2027",
                "2. **`data/research2027.json` aktualisieren**: Ranks/Projektionen verschieben, Riser/Faller einarbeiten, Spieler entfernen, die nicht mehr draft-eligible sind (bereits gedraftet/NFL). Mock-Draft (32 Picks) an aktuelle Draft-Order-Projektionen und Team-Needs anpassen.",
                "3. **Board wachsen lassen**: In JEDEM Zyklus mindestens 5–10 NEUE Spielerprofile ergänzen (weiter in die Tiefe der Positionsrankings, Day-2/Day-3-Prospects, Sleeper). Für jeden neuen Spieler alle Felder ausfüllen – individuelles `report_de` (5–8 Sätze, natürlich, nicht generisch), individuelles `forstner`-Zitat (variabler Tonfall) sowie vielseitige, spielerspezifische `best_case`/`worst_case`-NFL-Vergleiche (Vergleichsnamen NICHT wiederholen). Ziel: über die Saison von aktuell ~50 auf 150+ Profile wachsen.",
                "4. **`updated`-Datum** in `data/board-meta.json` auf heute setzen.",
                "5. **Neu bauen**: `python3 scripts/build_2027.py` (erzeugt `data/data.json` + `data/mockdraft.json`), dann `npm install && npx next build` zur Verifikation.",
                "6. **Deploy**: Änderungen committen und auf `main` pushen (Vercel deployt automatisch).",
                "",
                "Ziel: Das Board verschiebt sich sichtbar mit der Nachrichtenlage (Leistungen, Verletzungen, Transfers, Declares) UND wird mit jedem Zyklus umfangreicher."
              ].join("\n")
            });
